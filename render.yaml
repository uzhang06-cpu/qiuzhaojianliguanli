# SmartTracker — 前后端合一部署
# 一个 Web Service 同时托管 API + 前端静态文件

services:
  - type: web
    name: smarttracker
    env: python
    region: singapore

    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt

    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        value: sqlite:///./smart_tracker.db

      # ── LLM: DeepSeek（推荐） ──
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash

      # ── LLM 备选：OpenAI（取消注释，注释上方 DeepSeek 三行） ──
      # - key: OPENAI_API_KEY
      #   sync: false

      # ── 都不设置 → 自动用 Mock 规则引擎（无需 API Key） ──

      - key: DEBUG
        value: false
