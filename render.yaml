# SmartTracker — 前后端合一部署
# 一个 Web Service 同时托管 API + 前端静态文件

services:
  - type: web
    name: smarttracker
    env: python
    region: singapore

    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt

    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # ── 数据库（二选一） ──────────────────────────────────
      # 不设 = 用 SQLite（免费版重启后数据会丢，建议配 PG）
      #
      # 方案 A：Render PostgreSQL（同平台，最简单）
      #   1. Render Dashboard → New + → PostgreSQL
      #   2. 创建后拿到 Internal Database URL
      #   3. 粘贴到下面（去掉 # ）
      #
      # 方案 B：Supabase（永久免费）
      #   1. https://supabase.com 注册
      #   2. New Project → 记下 Database password
      #   3. 项目 Settings → Database → Connection string (URI)
      #   4. 把密码填进去，粘贴到下面
      #
      # - key: DATABASE_URL
      #   value: postgresql://user:password@host:5432/dbname

      # ── LLM: DeepSeek v4 Flash ───────────────────────────
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash

      # ── 不设 DeepSeek → 自动用 Mock（功能完整，无需 Key） ──
      - key: DEBUG
        value: false
