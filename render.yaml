# SmartTracker — 前后端合一部署
# 一个 Web Service 同时托管 API + 前端静态文件

services:
  - type: web
    name: smarttracker
    env: python
    region: singapore

    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt

    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # ── 数据库（⚠️ 生产环境**必须**配置外部数据库） ──────────────
      #
      # Render 免费 web service 每次冷启动会清空文件系统 → 用 SQLite
      # 意味着注册的账号在几分钟不活跃后会被"重置"。这是免费方案
      # 的固有限制，必须走外部持久化数据库。
      #
      # 推荐（永久免费额度）：
      #   • Supabase — https://supabase.com  免费 500MB PG，无停机
      #   • Neon     — https://neon.tech     免费 3GB PG，自动休眠唤醒
      #
      # 配置步骤：
      #   1. 上面任一平台注册并新建 project
      #   2. 复制 Connection string (URI)  形如
      #      postgresql://<user>:<password>@<host>:5432/<dbname>
      #   3. 在 Render Dashboard → 本 service → Environment → Add Env Var
      #      Key   = DATABASE_URL
      #      Value = 上面那串 URI
      #   4. Manual Deploy → 完成后账号数据将持久保存
      - key: DATABASE_URL
        sync: false  # 必填，通过 Render Dashboard 输入，不要写死在 yaml 里

      # ── LLM: DeepSeek v4 Flash ───────────────────────────
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash

      # ── 不设 DeepSeek → 自动用 Mock（功能完整，无需 Key） ──
      - key: DEBUG
        value: false
